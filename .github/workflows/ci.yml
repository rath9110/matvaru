name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        if: env.WILLYS_USERNAME != ''
        env:
          WILLYS_USERNAME: ${{ secrets.WILLYS_USERNAME }}
          WILLYS_PASSWORD: ${{ secrets.WILLYS_PASSWORD }}
        run: npm run test:integration
